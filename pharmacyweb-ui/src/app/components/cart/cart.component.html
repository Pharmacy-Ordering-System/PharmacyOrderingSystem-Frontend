<div class="cart-container">
  <div class="cart-wrapper">

    <!-- LEFT SIDE -->
    <div class="cart-left">

      <h2 class="page-title">Shopping Cart</h2>

      <div *ngFor="let item of cartItems" class="cart-item-card">

        <div class="item-left">
          <img src="https://via.placeholder.com/80" class="item-image">

          <div class="item-details">
            <h4>{{item.name}}</h4>
            <p class="price">₹{{item.price}}</p>
          </div>
        </div>

        <div class="item-right">

          <div class="quantity-box">
            <button (click)="decrease(item)">−</button>
            <span>{{item.quantity}}</span>
            <button (click)="increase(item)">+</button>
          </div>

          <div class="item-total">
            ₹{{item.price * item.quantity}}
          </div>

          <button class="remove-btn" (click)="remove(item)">
            Remove
          </button>

        </div>
      </div>

      <div *ngIf="cartItems.length === 0" class="empty-state">
        Your cart is empty
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="cart-right">

      <div class="summary-card">
        <h3>Order Summary</h3>

        <div class="summary-row">
          <span>Subtotal</span>
          <span>₹{{getTotal()}}</span>
        </div>

        <div class="summary-row">
          <span>Shipping</span>
          <span class="free">Free</span>
        </div>

        <hr>

        <div class="summary-row total">
          <span>Total</span>
          <span>₹{{getTotal()}}</span>
        </div>

        <button
          class="checkout-btn"
          (click)="placeOrder()"
          [disabled]="loading">
          {{ loading ? 'Processing...' : 'Place Order' }}
        </button>

        <p class="success-msg" *ngIf="message">
          {{message}}
        </p>
      </div>

    </div>

  </div>
</div>
