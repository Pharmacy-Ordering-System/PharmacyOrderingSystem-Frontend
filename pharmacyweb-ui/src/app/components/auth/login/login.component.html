<div class="auth-container">
  <div class="auth-card">
    <h2>Sign In</h2>

    <input [(ngModel)]="formData.email" type="email" placeholder="Email" class="form-control">
    <input [(ngModel)]="formData.password" type="password" placeholder="Password" class="form-control">

    <button class="primary-btn" (click)="login()" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Login' }}
    </button>

    <p class="error" *ngIf="error">{{ error }}</p>

    <p class="switch">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
