<div class="profile-container">
  <div class="profile-card">
    <h2>My Profile</h2>
    
    <div *ngIf="loading" class="loading">Loading...</div>
    
    <div *ngIf="error" class="error-msg">{{ error }}</div>
    
    <div *ngIf="!loading && user">
      <div class="form-group">
        <label>Name</label>
        <input [(ngModel)]="user.name" class="form-control" placeholder="Full Name">
      </div>
      
      <div class="form-group">
        <label>Email</label>
        <input [value]="user.email" class="form-control" disabled>
        <small>Email cannot be changed</small>
      </div>
      
      <div class="form-group">
        <label>Role</label>
        <input [value]="user.role" class="form-control" disabled>
      </div>
      
      <div class="form-group">
        <label>Member Since</label>
        <input [value]="user.createdAt | date:'mediumDate'" class="form-control" disabled>
      </div>
      
      <div class="form-actions">
        <button class="primary-btn" (click)="updateProfile()" [disabled]="saving">
          {{ saving ? 'Saving...' : 'Update Profile' }}
        </button>
      </div>
      
      <div *ngIf="message" class="success-msg">{{ message }}</div>
    </div>
  </div>
</div>
